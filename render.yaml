##############################################################################
#  NexGen Finance — Render.com deployment manifest
#  https://render.com/docs/yaml-spec
##############################################################################

services:
  - type: web
    name: nexgen-finance
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      # ── Static values ───────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: PORT
        value: "10000"

      - key: FRONTEND_URL
        value: https://nexgen-finance.onrender.com

      - key: CORS_ORIGINS
        value: https://nexgen-finance.onrender.com

      - key: SEC_RETENTION_YEARS
        value: "7"

      - key: POLICY_VERSION
        value: "1.0.0"

      - key: DPO_EMAIL
        value: privacy@corverxis.com

      - key: LOG_LEVEL
        value: info

      - key: JWT_ACCESS_TTL
        value: 15m

      - key: JWT_REFRESH_TTL
        value: 30d

      # ── Auto-generated secrets ───────────────────────────────────────────────
      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: SESSION_SECRET
        generateValue: true

      # ── Database — paste your existing Render Postgres connection string ──────
      # Go to: Render Dashboard → your existing DB → Info → Internal Database URL
      # Then add it manually in: Web Service → Environment → DATABASE_URL

      # ── Secrets — set manually in Render dashboard after deploy ─────────────
      # ANTHROPIC_API_KEY     — your sk-ant-... key
      # ENCRYPTION_KEY        — run: openssl rand -hex 32  (must be 64 chars)
      # GOOGLE_CLIENT_ID      — from console.cloud.google.com
      # GOOGLE_CLIENT_SECRET  — from console.cloud.google.com
      # GOOGLE_CALLBACK_URL   — https://nexgen-finance.onrender.com/api/auth/google/callback
      # GITHUB_CLIENT_ID      — from github.com/settings/applications
      # GITHUB_CLIENT_SECRET  — from github.com/settings/applications
      # GITHUB_CALLBACK_URL   — https://nexgen-finance.onrender.com/api/auth/github/callback
      # MICROSOFT_CLIENT_ID      — from portal.azure.com
      # MICROSOFT_CLIENT_SECRET  — from portal.azure.com
      # MICROSOFT_CALLBACK_URL   — https://nexgen-finance.onrender.com/api/auth/microsoft/callback
