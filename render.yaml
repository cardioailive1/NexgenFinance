services:
  - type: web
    name: nexgen-finance
    runtime: node
    region: oregon
    plan: starter
    branch: main
    rootDir: .
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run prisma:seed
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: https://nexgen-finance.onrender.com
      - key: CORS_ORIGINS
        value: https://nexgen-finance.onrender.com
      - key: SEC_RETENTION_YEARS
        value: "7"
      - key: POLICY_VERSION
        value: "1.0.0"
      - key: DPO_EMAIL
        value: privacy@corverxis.com
      - key: LOG_LEVEL
        value: info
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nexgen-finance-db
          property: connectionString

databases:
  - name: nexgen-finance-db
    databaseName: nexgen_finance
    user: nexgen
    region: oregon
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections
